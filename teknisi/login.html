<!doctype html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Teknisi - Service HP Manager</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    body {
      color-scheme: dark;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.18), transparent 30rem),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.18), transparent 28rem),
        #0f172a;
    }

    .login-card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(51, 65, 85, 0.9);
      box-shadow: 0 24px 70px rgba(2, 6, 23, 0.38);
      backdrop-filter: blur(14px);
    }

    input {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    input:focus {
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
  </style>
</head>
<body class="h-full text-slate-100">
  <main class="flex min-h-full items-center justify-center p-6">
    <section class="login-card w-full max-w-md rounded-2xl p-8">
      <a href="../" class="mb-8 inline-flex items-center gap-2 text-sm font-semibold text-slate-400 hover:text-emerald-300">
        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Portal
      </a>

      <div class="mb-8">
        <div class="mb-5 flex h-12 w-12 items-center justify-center rounded-xl bg-emerald-500/15 text-emerald-300">
          <i data-lucide="wrench" style="width: 24px; height: 24px;"></i>
        </div>
        <p class="text-sm font-semibold uppercase tracking-[0.18em] text-emerald-300">Teknisi</p>
        <h1 class="mt-3 text-3xl font-bold text-white">Masuk Teknisi</h1>
        <p class="mt-3 text-sm leading-6 text-slate-400">Akses meja teknisi, antrian pekerjaan, update status servis, dan klaim garansi.</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="mb-1 block text-xs font-medium text-slate-300">Username</label>
          <input type="text" id="username" autocomplete="username" value="teknisi" required class="w-full rounded-lg border border-slate-600 bg-slate-800 px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500">
        </div>
        <div>
          <label class="mb-1 block text-xs font-medium text-slate-300">Password</label>
          <div class="relative">
            <input type="password" id="password" autocomplete="current-password" required class="w-full rounded-lg border border-slate-600 bg-slate-800 px-3 py-3 pr-11 text-sm text-white focus:outline-none focus:border-emerald-500">
            <button type="button" onclick="togglePassword()" class="absolute right-2 top-1/2 -translate-y-1/2 rounded-md p-2 text-slate-400 hover:bg-white/10 hover:text-white" aria-label="Tampilkan password">
              <i data-lucide="eye" style="width: 16px; height: 16px;"></i>
            </button>
          </div>
        </div>
        <p id="loginError" class="hidden rounded-lg border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-200"></p>
        <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-emerald-600 to-cyan-600 py-3 text-sm font-semibold text-white transition hover:from-emerald-700 hover:to-cyan-700">
          Masuk Teknisi
        </button>
      </form>
    </section>
  </main>

  <script>
    const AUTH_KEY = 'serviceHpManagerSession';
    const ROLE = 'teknisi';

    function getSession() {
      try {
        return JSON.parse(localStorage.getItem(AUTH_KEY) || 'null');
      } catch (error) {
        return null;
      }
    }

    function redirectIfLoggedIn() {
      const session = getSession();
      if (session?.role === ROLE) {
        goToTeknisiApp();
      }
    }

    function goToTeknisiApp() {
      const target = window.location.protocol === 'file:' ? './index.html' : '/teknisi/';
      window.location.replace(target);
    }

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showError(message) {
      const error = document.getElementById('loginError');
      error.textContent = message;
      error.classList.remove('hidden');
    }

    document.getElementById('loginForm').addEventListener('submit', event => {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (username !== 'teknisi' || password !== 'teknisi123') {
        showError('Username atau password teknisi salah.');
        return;
      }

      localStorage.setItem(AUTH_KEY, JSON.stringify({
        role: ROLE,
        name: 'Teknisi',
        loginAt: new Date().toISOString()
      }));
      goToTeknisiApp();
    });

    document.addEventListener('DOMContentLoaded', () => {
      redirectIfLoggedIn();
      if (window.lucide) lucide.createIcons();
    });
  </script>
</body>
</html>
